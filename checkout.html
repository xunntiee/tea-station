<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dang chuyen sang Trevo</title>
    <link rel="stylesheet" href="./dist/output.css" />
    <script type="module" src="./js/checkout.js" defer></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-[#f5efe6] via-white to-[#efe6d5] text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-2xl flex-col items-center justify-center px-6 py-16 text-center">
      <div class="w-full rounded-[2rem] border border-black/10 bg-white/85 p-8 shadow-2xl shadow-black/5 backdrop-blur">
        <p class="text-xs font-semibold uppercase tracking-[0.4em] text-emerald-700">Trevo Checkout</p>
        <h1 class="mt-4 text-3xl font-semibold">Dang chuyen sang trang dat hang</h1>
        <p id="checkout-message" class="mt-3 text-sm leading-6 text-slate-600">
          Vui long cho trong giay lat.
        </p>
        <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
          <a id="checkout-continue" class="inline-flex items-center justify-center rounded-full bg-slate-900 px-5 py-3 text-sm font-medium text-white transition hover:bg-slate-800" href="#">
            Tiep tuc
          </a>
          <a href="./products.html" class="inline-flex items-center justify-center rounded-full border border-slate-300 px-5 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50">
            Quay lai
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
